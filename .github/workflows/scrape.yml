name: Scrape Visa Bulletin

on:
  schedule:
    - cron: "0 18 25 * *"
  workflow_dispatch:
    inputs:
      history:
        description: "Number of bulletins to fetch (default 1)"
        default: "1"
        required: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: |
          N="${{ github.event.inputs.history || '1' }}"
          python scraper/scraper.py --history "$N"

      - name: Commit data update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update visa bulletin $(date +'%Y-%m')"
          git push
